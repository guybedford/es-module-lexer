version = 0.1
default-task = 'build'

extensions = ['chomp@0.1:npm', 'chomp@0.1:footprint', 'chomp@0.1:terser']

[env-default]
EMSDK_PATH = '../emsdk'
EMSDK_FASTCOMP_PATH = '../emsdk-fastcomp'
WABT_PATH = '../wabt'

[[task]]
name = 'build'
deps = [
  'dist/lexer.js', 'dist/lexer.cjs', 'dist/lexer.asm.js',
  'dist/lexer.minimal.js', 'dist/lexer.minimal.cjs', 'dist/lexer.minimal.asm.js',
  'types/lexer.d.ts', 'types/lexer.minimal.d.ts'
]

[[task]]
name = 'bench'
serial = true
deps = ['bench:js', 'bench:wasm', 'bench:minimal:js', 'bench:minimal:wasm']

[[task]]
name = 'bench:js'
deps = ['dist/lexer.asm.js']
env = { BENCH = 'js' }
run = 'node --expose-gc bench/index.js'

[[task]]
name = 'bench:wasm'
deps = ['dist/lexer.js']
env = { BENCH = 'wasm' }
run = 'node --expose-gc bench/index.js'

[[task]]
name = 'bench:minimal:js'
deps = ['dist/lexer.minimal.asm.js']
env = { BENCH = 'minimal-js' }
run = 'node --expose-gc bench/index.js'

[[task]]
name = 'bench:minimal:wasm'
deps = ['dist/lexer.minimal.js']
env = { BENCH = 'minimal-wasm' }
run = 'node --expose-gc bench/index.js'

[[task]]
target = 'dist/lexer.asm.js'
dep = 'lib/lexer.asm.js'
template = 'terser'
[task.template-options]
module = true
compress = { ecma = 6, unsafe = true }
output = { preamble = '/* es-module-lexer #PJSON_VERSION */' }

[[task]]
target = 'dist/lexer.minimal.asm.js'
dep = 'lib/lexer.min.asm.js'
template = 'terser'
[task.template-options]
module = true
compress = { ecma = 6, unsafe = true }
output = { preamble = '/* es-module-lexer (minimal) #PJSON_VERSION */' }

[[task]]
target = 'dist/lexer.cjs'
deps = ['dist/lexer.js']
run = 'babel dist/lexer.js | terser -c -m -o dist/lexer.cjs'

[[task]]
target = 'dist/lexer.minimal.cjs'
deps = ['dist/lexer.minimal.js']
run = 'babel dist/lexer.minimal.js | terser -c -m -o dist/lexer.minimal.cjs'

[[task]]
name = 'build:swc'
target = 'src/lexer.js'
dep = 'src/lexer.ts'
# Note we should use the chomp swc template, but
# https://github.com/swc-project/cli/issues/113 means we always get a sourcemap
# even when we set "source-maps = false", so for now we have ejected the
# template to its raw "run" command, and added an "rm" step.
run = '''
node ./node_modules/@swc/cli/bin/swc.js $DEP -o $TARGET --no-swcrc -C jsc.parser.syntax=typescript -C jsc.parser.importAssertions=true -C jsc.parser.topLevelAwait=true -C jsc.parser.importMeta=true -C jsc.parser.privateMethod=true -C jsc.parser.dynamicImport=true -C jsc.target=es2016 -C jsc.experimental.keepImportAttributes=true
'''

[[task]]
# Note swc does not support emitting typings
# (https://github.com/swc-project/swc/issues/657), so while swc is used to
# generate the .js file, tsc is still needed to generate the d.ts file.
name = 'build:types'
target = 'types/lexer.d.ts'
dep = 'src/lexer.ts'
# `--types node` is explicit: TypeScript 6 no longer auto-includes @types/node
# for a file passed on the command line, so `Buffer` (lexer.ts) would error.
run = '''
  tsc --strict --declaration --emitDeclarationOnly --types node --outdir types src/lexer.ts
'''

[[task]]
# Minimal build types: shared declarations re-exported from lexer.d.ts, with
# ExportSpecifier (no ss) and parse() (2-tuple) overridden. See gen-min-dts.mjs.
target = 'types/lexer.minimal.d.ts'
deps = ['types/lexer.d.ts', 'build/gen-min-dts.mjs']
run = 'node build/gen-min-dts.mjs'

[[task]]
target = 'dist/lexer.js'
deps = ['src/lexer.js', 'lib/lexer.wasm', 'package.json']
env = { SRC = 'src/lexer.js', WASM = 'lib/lexer.wasm' }
run = 'node build/embed-wasm.mjs'

[[task]]
target = 'dist/lexer.minimal.js'
deps = ['src/lexer.min.js', 'lib/lexer.min.wasm', 'package.json']
env = { SRC = 'src/lexer.min.js', WASM = 'lib/lexer.min.wasm' }
run = 'node build/embed-wasm.mjs'

[[task]]
name = 'build:swc-min'
target = 'src/lexer.min.js'
dep = 'src/lexer.ts'
# Same swc invocation as build:swc, then flip the build-time MINIMAL flag so
# terser (in the embed step) drops the full-only reader paths.
run = '''
node ./node_modules/@swc/cli/bin/swc.js $DEP -o $TARGET --no-swcrc -C jsc.parser.syntax=typescript -C jsc.parser.importAssertions=true -C jsc.parser.topLevelAwait=true -C jsc.parser.importMeta=true -C jsc.parser.privateMethod=true -C jsc.parser.dynamicImport=true -C jsc.target=es2016 -C jsc.experimental.keepImportAttributes=true
node -e "const fs=require('fs');const f='$TARGET';fs.writeFileSync(f,fs.readFileSync(f,'utf8').replace('MINIMAL = false','MINIMAL = true').replace('MINIMAL=false','MINIMAL=true'))"
'''

[[task]]
target = 'lib/lexer.wasm'
deps = ['src/lexer.h', 'src/lexer.c']
env = { PYTHONHOME = '' }
run = """
	${{ EMSDK_PATH }}/emsdk install 6.0.0
	${{ EMSDK_PATH }}/emsdk activate 6.0.0

	${{ EMSDK_PATH }}/upstream/emscripten/emcc src/lexer.c -o lib/lexer.wasm -Oz -flto --no-entry -s STANDALONE_WASM=1 \
	-s EXPORTED_FUNCTIONS="['_parse','_sa','_e','_ri','_re','_it','_is','_ie','_ss','_ip','_se','_ai','_id','_es','_ee','_els','_ele','_ess','_f','_ms','_ra','_rsa','_aks','_ake','_avs','_ave','_rt','_te','_rts','___heap_base']" \
	-s SUPPORT_LONGJMP=0 -s ALLOW_MEMORY_GROWTH=1 -s ERROR_ON_UNDEFINED_SYMBOLS=0 -Wno-logical-op-parentheses -Wno-parentheses
"""

[[task]]
# Minimal wasm build (-DLEXER_MIN): drops the getters es-module-shims never
# reads (ess/f/ms + attributes) and the facade fast path. See src/lexer.c.
# Depends on lib/lexer.wasm so the two upstream-emsdk builds run sequentially
# rather than racing on the shared emsdk activation.
target = 'lib/lexer.min.wasm'
deps = ['src/lexer.h', 'src/lexer.c', 'lib/lexer.wasm']
env = { PYTHONHOME = '' }
run = """
	${{ EMSDK_PATH }}/emsdk install 6.0.0
	${{ EMSDK_PATH }}/emsdk activate 6.0.0

	${{ EMSDK_PATH }}/upstream/emscripten/emcc src/lexer.c -DLEXER_MIN -o lib/lexer.min.wasm -Oz -flto --no-entry -s STANDALONE_WASM=1 \
	-s EXPORTED_FUNCTIONS="['_parse','_sa','_e','_ri','_re','_it','_is','_ie','_ss','_ip','_se','_ai','_id','_es','_ee','_els','_ele','___heap_base']" \
	-s SUPPORT_LONGJMP=0 -s ALLOW_MEMORY_GROWTH=1 -s ERROR_ON_UNDEFINED_SYMBOLS=0 -Wno-logical-op-parentheses -Wno-parentheses
"""

[[task]]
target = 'lib/lexer.emcc.asm.js'
deps = ['src/lexer.h', 'src/lexer.c']
env = { PYTHONHOME = '' }
run = """
	${{ EMSDK_FASTCOMP_PATH }}/emsdk install 1.40.1-fastcomp
	${{ EMSDK_FASTCOMP_PATH }}/emsdk activate 1.40.1-fastcomp

	${{ EMSDK_FASTCOMP_PATH }}/fastcomp/emscripten/emcc ./src/lexer.c -o lib/lexer.emcc.js -s WASM=0 -Oz --closure 1 \
	-s EXPORTED_FUNCTIONS="['_parse','_sa','_e','_ri','_re','_it','_is','_ie','_ss','_ip','_se','_ai','_id','_es','_ee','_els','_ele','_ess','_f','_ms','_ra','_rsa','_aks','_ake','_avs','_ave','_rt','_te','_rts','_setSource']" \
	-s AGGRESSIVE_VARIABLE_ELIMINATION=1 -s GLOBAL_BASE=8 \
	-s ERROR_ON_UNDEFINED_SYMBOLS=0 -s TOTAL_STACK=4997968 -s --separate-asm -Wno-logical-op-parentheses -Wno-parentheses
"""

[[task]]
# Sidecar fastcomp build with closure disabled. Closure folds the memory-layout
# constants away in the shipped (closure 1) build, so this readable build exists
# only to extract GLOBAL_BASE and STACK_BASE. Same layout-affecting flags as
# lib/lexer.emcc.asm.js, so its layout (and .mem) matches the shipped build.
# Depends on lib/lexer.emcc.asm.js so the two fastcomp builds run sequentially
# rather than racing on the shared emsdk activation.
target = 'lib/lexer.layout.js'
deps = ['src/lexer.h', 'src/lexer.c', 'lib/lexer.emcc.asm.js']
env = { PYTHONHOME = '' }
run = """
	${{ EMSDK_FASTCOMP_PATH }}/emsdk install 1.40.1-fastcomp
	${{ EMSDK_FASTCOMP_PATH }}/emsdk activate 1.40.1-fastcomp

	${{ EMSDK_FASTCOMP_PATH }}/fastcomp/emscripten/emcc ./src/lexer.c -o lib/lexer.layout.js -s WASM=0 -Oz --closure 0 \
	-s EXPORTED_FUNCTIONS="['_parse','_sa','_e','_ri','_re','_it','_is','_ie','_ss','_ip','_se','_ai','_id','_es','_ee','_els','_ele','_ess','_f','_ms','_ra','_rsa','_aks','_ake','_avs','_ave','_rt','_te','_rts','_setSource']" \
	-s AGGRESSIVE_VARIABLE_ELIMINATION=1 -s GLOBAL_BASE=8 \
	-s ERROR_ON_UNDEFINED_SYMBOLS=0 -s TOTAL_STACK=4997968 -Wno-logical-op-parentheses -Wno-parentheses
"""

[[task]]
# Minimal fastcomp asm.js build (-DLEXER_MIN), mirroring lib/lexer.emcc.asm.js.
# Chained after the full fastcomp builds (via lib/lexer.layout.js) so the
# fastcomp emsdk activation is never run concurrently.
target = 'lib/lexer.min.emcc.asm.js'
deps = ['src/lexer.h', 'src/lexer.c', 'lib/lexer.layout.js']
env = { PYTHONHOME = '' }
run = """
	${{ EMSDK_FASTCOMP_PATH }}/emsdk install 1.40.1-fastcomp
	${{ EMSDK_FASTCOMP_PATH }}/emsdk activate 1.40.1-fastcomp

	${{ EMSDK_FASTCOMP_PATH }}/fastcomp/emscripten/emcc ./src/lexer.c -DLEXER_MIN -o lib/lexer.min.emcc.js -s WASM=0 -Oz --closure 1 \
	-s EXPORTED_FUNCTIONS="['_parse','_sa','_e','_ri','_re','_it','_is','_ie','_ss','_ip','_se','_ai','_id','_es','_ee','_els','_ele','_setSource']" \
	-s AGGRESSIVE_VARIABLE_ELIMINATION=1 -s GLOBAL_BASE=8 \
	-s ERROR_ON_UNDEFINED_SYMBOLS=0 -s TOTAL_STACK=4997968 -s --separate-asm -Wno-logical-op-parentheses -Wno-parentheses
"""

[[task]]
# Minimal closure-disabled layout sidecar (-DLEXER_MIN), mirroring
# lib/lexer.layout.js. Sequenced after lib/lexer.min.emcc.asm.js to avoid racing
# on the shared emsdk activation.
target = 'lib/lexer.min.layout.js'
deps = ['src/lexer.h', 'src/lexer.c', 'lib/lexer.min.emcc.asm.js']
env = { PYTHONHOME = '' }
run = """
	${{ EMSDK_FASTCOMP_PATH }}/emsdk install 1.40.1-fastcomp
	${{ EMSDK_FASTCOMP_PATH }}/emsdk activate 1.40.1-fastcomp

	${{ EMSDK_FASTCOMP_PATH }}/fastcomp/emscripten/emcc ./src/lexer.c -DLEXER_MIN -o lib/lexer.min.layout.js -s WASM=0 -Oz --closure 0 \
	-s EXPORTED_FUNCTIONS="['_parse','_sa','_e','_ri','_re','_it','_is','_ie','_ss','_ip','_se','_ai','_id','_es','_ee','_els','_ele','_setSource']" \
	-s AGGRESSIVE_VARIABLE_ELIMINATION=1 -s GLOBAL_BASE=8 \
	-s ERROR_ON_UNDEFINED_SYMBOLS=0 -s TOTAL_STACK=4997968 -Wno-logical-op-parentheses -Wno-parentheses
"""

[[task]]
# Resolve the wrapper's {{OFFSET}}/{{STATIC_TOP}}/{{WORDS}} from the actual
# fastcomp layout (see build/gen-asm-in.mjs), rather than hardcoding them.
target = 'lib/lexer.asm.in.js'
deps = ['src/lexer.asm.js', 'lib/lexer.layout.js', 'build/gen-asm-in.mjs']
env = { SRC = 'src/lexer.asm.js', LAYOUT = 'lib/lexer.layout.js', MINIMAL = '0' }
run = 'node build/gen-asm-in.mjs'

[[task]]
# Minimal asm.js wrapper prelude: same derivation, against the minimal layout,
# with the MINIMAL build-time flag flipped on.
target = 'lib/lexer.min.asm.in.js'
deps = ['src/lexer.asm.js', 'lib/lexer.min.layout.js', 'build/gen-asm-in.mjs']
env = { SRC = 'src/lexer.asm.js', LAYOUT = 'lib/lexer.min.layout.js', MINIMAL = '1' }
run = 'node build/gen-asm-in.mjs'

[[task]]
target = 'lib/lexer.asm.js'
deps = ['lib/lexer.emcc.asm.js', 'lib/lexer.asm.in.js', 'build/combine-asm.mjs']
env = { ASM_IN = 'lib/lexer.asm.in.js', EMCC = 'lib/lexer.emcc.asm.js' }
run = 'node build/combine-asm.mjs'

[[task]]
target = 'lib/lexer.min.asm.js'
deps = ['lib/lexer.min.emcc.asm.js', 'lib/lexer.min.asm.in.js', 'build/combine-asm.mjs']
env = { ASM_IN = 'lib/lexer.min.asm.in.js', EMCC = 'lib/lexer.min.emcc.asm.js' }
run = 'node build/combine-asm.mjs'

[[task]]
name = 'test'
deps = ['test:wasm', 'test:asm', 'test:minimal:wasm', 'test:minimal:asm']

[[task]]
name = 'test:js'
run = 'mocha -b -u tdd test/*.cjs'

[[task]]
name = 'test:asm'
deps = ['dist/lexer.asm.js']
env = { ASM = '1' }
run = 'mocha -b -u tdd test/*.cjs'

[[task]]
name = 'test:wasm'
deps = ['dist/lexer.js']
env = { WASM = '1' }
run = 'mocha -b -u tdd test/*.cjs'

[[task]]
name = 'test:minimal:asm'
deps = ['dist/lexer.minimal.asm.js']
env = { ASM = '1', MINIMAL = '1' }
run = 'mocha -b -u tdd test/*.cjs'

[[task]]
name = 'test:minimal:wasm'
deps = ['dist/lexer.minimal.js']
env = { WASM = '1', MINIMAL = '1' }
run = 'mocha -b -u tdd test/*.cjs'

[[task]]
target = 'lib/lexer.wat'
dep = 'lib/lexer.wasm'
run = '${{ WABT_PATH }}/bin/wasm2wat lib/lexer.wasm -o lib/lexer.wat'

[[task]]
name = 'footprint'
deps = ['dist/lexer.js', 'dist/lexer.asm.js', 'dist/lexer.minimal.js', 'dist/lexer.minimal.asm.js']
template = 'footprint'
